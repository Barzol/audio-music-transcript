# config.yaml
# hyperparameters for MusicNet
# balance quality and training (1-3h)

dataset:
  csv_file: "C:/Users/david_jppxf8k/.cache/kagglehub/datasets/alonhaviv/the-maestro-dataset-v3-0-0/versions/1/maestro-v3.0.0/maestro-v3.0.0.csv"
  data_dir: "C:/Users/david_jppxf8k/.cache/kagglehub/datasets/alonhaviv/the-maestro-dataset-v3-0-0/versions/1/maestro-v3.0.0"
  chunk_duration: 5.0
  sample_rate: 22050
  hop_length: 512
  midi_min: 33
  midi_max: 116

model :
  input_features: 84
  hidden_size: 512
  lstm_layers: 3
  dropout: 0.4

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.0005
  scheduler_patience: 3
  scheduler_factor: 0.5
  pos_weight : 10

evaluation:
  checkpoint_path: "checkpoints/best_model.pt"
  threshold: 0.35

